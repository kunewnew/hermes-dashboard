<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 Meow Office · Live Cat Agent Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; overflow: hidden;
  font-family: 'Courier New', monospace;
}
#wrap { position: relative; }
canvas { display: block; border: 3px solid #333355; border-radius: 4px; cursor: pointer; }
#info {
  position: absolute; bottom: 8px; left: 8px; right: 8px;
  background: rgba(0,0,0,0.85); border: 2px solid #ffcc00;
  color: #ffcc00; padding: 6px 12px; font-size: 11px;
  pointer-events: none; display: none; border-radius: 3px;
}
#quota {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,0,0,0.8); border: 1px solid #333355;
  padding: 6px 10px; font-size: 9px; color: #8888aa;
  display: flex; gap: 12px; border-radius: 2px;
}
#quota span { color: #00ff88; font-weight: 700; }
#title {
  position: absolute; top: 10px; left: 10px;
  font-size: 11px; color: #ffcc00; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  background: rgba(0,0,0,0.7); padding: 3px 8px;
  border: 1px solid #333; border-radius: 2px;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="title">🐱 MEOW OFFICE</div>
  <div id="quota">
    OR <span>$4.13/$10</span>
    OC <span>~$2.52/$60</span>
  </div>
  <div id="info"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');

const W = 960, H = 580;
canvas.width = W; canvas.height = H;

// Scale to fit viewport
function resize() {
  const scale = Math.min(innerWidth/W, innerHeight/H, 1);
  canvas.style.width = W*scale+'px';
  canvas.style.height = H*scale+'px';
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// OFFICE LAYOUT
// ============================================================
const desks = [
  { x:120, y:100, label:'ทองเอก', color:'#ffcc00' },
  { x:340, y:100, label:'เอเรน', color:'#ff8833' },
  { x:560, y:100, label:'Codin', color:'#44dd44' },
  { x:780, y:100, label:'Navi', color:'#ffaa00' },
  { x:230, y:330, label:'Tick-Tock', color:'#ffcc00' },
  { x:450, y:330, label:'Nora', color:'#ff88cc' },
  { x:670, y:330, label:'Filo', color:'#8888ff' },
];

const coffeeMachine = { x:30, y:430 };
const plant1 = { x:880, y:60 };
const plant2 = { x:50, y:60 };

// ============================================================
// CAT DATA
// ============================================================
const cats = [
  { id:'thongek', name:'ทองเอก', breed:'วิเชียรมาศ',
    body:'#faf0dc', points:'#3d2b1a', eyes:'#4488ff', inner:'#f5d5c8',
    outfit:'#1a2a44', accent:'#ffcc00',
    x:120, y:180, tx:120, ty:180, state:'working', desk:0,
    tasks:1284, rate:97, 
    logs:['ประชุมทีมแมว','วิเคราะห์ dashboard','จัดสรรงานให้ agent'] },
  { id:'eren', name:'เอเรน', breed:'แมวส้มขนฟู',
    body:'#ff8833', points:'#ff9944', eyes:'#44cc44', inner:'#ffbb88',
    outfit:'#ffffff', accent:'#ff4444',
    x:340, y:180, tx:340, ty:180, state:'working', desk:1,
    tasks:2341, rate:95,
    logs:['เขียน CSS pixel art','ดีไซน์ตัวละครแมว','ทำ animation'] },
  { id:'codin', name:'Codin', breed:'สีสวาท',
    body:'#8899aa', points:'#667788', eyes:'#44dd44', inner:'#aabbcc',
    outfit:'#2a2a3a', accent:'#44dd44',
    x:560, y:180, tx:560, ty:180, state:'working', desk:2,
    tasks:3421, rate:94,
    logs:['Refactor โค้ด','debug ระบบ','เขียน API'] },
  { id:'navi', name:'Navi', breed:'ขาวมณี',
    body:'#ffffff', points:'#eeeeee', eyes:'#ffaa00', inner:'#ffdddd',
    outfit:'#336644', accent:'#ffaa00',
    x:780, y:180, tx:780, ty:180, state:'working', desk:3,
    tasks:2156, rate:96,
    logs:['ค้นหาข้อมูล','scrape เว็บ','วิเคราะห์รูปภาพ'] },
  { id:'ticktock', name:'Tick-Tock', breed:'ลายสลิด',
    body:'#999999', points:'#666666', eyes:'#ffcc00', inner:'#bbbbbb',
    outfit:'#443322', accent:'#ffcc00',
    x:230, y:410, tx:230, ty:410, state:'working', desk:4,
    tasks:876, rate:99,
    logs:['แจ้งตารางสอน','cron backup','ส่งสรุปรายวัน'] },
  { id:'nora', name:'Nora', breed:'สามสี',
    body:'#ffffff', points:'#ff9944', eyes:'#ff88cc', inner:'#ffbbcc',
    outfit:'#553344', accent:'#ff88cc',
    x:450, y:410, tx:450, ty:410, state:'working', desk:5,
    tasks:5432, rate:100,
    logs:['บันทึกความจำ','sync ข้อมูล','ค้น session เก่า'] },
  { id:'filo', name:'Filo', breed:'แมวดำ',
    body:'#1a1a1a', points:'#111111', eyes:'#ffdd00', inner:'#333333',
    outfit:'#333344', accent:'#ffffff',
    x:670, y:410, tx:670, ty:410, state:'working', desk:6,
    tasks:1987, rate:95,
    logs:['จัดการไฟล์','เขียน document','จัดระเบียบ root'] },
];

// ============================================================
// DRAWING HELPERS
// ============================================================
function drawDesk(dx, dy, color, label) {
  // Desk shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(dx-2, dy+2, 72, 32);
  // Desk top
  ctx.fillStyle = '#3a3a50';
  ctx.fillRect(dx, dy, 70, 30);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.strokeRect(dx, dy, 70, 30);
  // Monitor
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(dx+20, dy-14, 30, 18);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(dx+20, dy-14, 30, 18);
  // Screen glow
  ctx.fillStyle = color+'22';
  ctx.fillRect(dx+22, dy-12, 26, 14);
  // Desk legs
  ctx.fillStyle = '#444';
  ctx.fillRect(dx+4, dy+30, 4, 8);
  ctx.fillRect(dx+62, dy+30, 4, 8);
  // Name plate
  ctx.fillStyle = '#111';
  ctx.fillRect(dx+8, dy+2, 54, 10);
  ctx.fillStyle = color;
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(label, dx+35, dy+10);
  // Activity dots on screen
  const t = Date.now()/1000;
  for (let i=0;i<3;i++) {
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.3 + 0.5*Math.abs(Math.sin(t*2+i));
    ctx.fillRect(dx+24+i*8, dy-10, 4, 4);
    ctx.globalAlpha = 1;
  }
}

function drawCat(cat) {
  const { x, y, body, points, eyes, inner, outfit, accent, state } = cat;
  ctx.save();
  ctx.translate(x, y);

  // Walking animation
  let bob = 0, legOff = 0;
  if (state === 'walking') {
    const t = Date.now()/150;
    bob = Math.abs(Math.sin(t*2))*3;
    legOff = Math.sin(t*3)*2;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, 22+bob, 14, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // TAIL
  const tailT = state==='working' ? Date.now()/300 : Date.now()/200;
  const tailAngle = state==='walking' ? Math.sin(tailT*4)*0.4 : Math.sin(tailT)*0.25;
  ctx.save();
  ctx.translate(0, 6+bob);
  ctx.rotate(0.3 + tailAngle);
  ctx.fillStyle = points;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(8, -8, 12, -18);
  ctx.lineWidth = 4;
  ctx.strokeStyle = points;
  ctx.stroke();
  // Tail tip
  ctx.fillStyle = points;
  ctx.beginPath();
  ctx.arc(12, -18, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // LEGS (back)
  ctx.fillStyle = body;
  ctx.fillRect(-4+legOff, 14+bob, 7, 8);
  ctx.fillRect(2-legOff, 14+bob, 7, 8);
  // Paws
  ctx.fillStyle = points;
  ctx.beginPath();
  ctx.arc(-0.5+legOff, 22+bob, 4.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.arc(5.5-legOff, 22+bob, 4.5, 0, Math.PI*2); ctx.fill();

  // BODY with outfit
  ctx.fillStyle = outfit;
  ctx.fillRect(-8, 0+bob, 16, 18);
  // Outfit detail - tie/scarf
  ctx.fillStyle = accent;
  ctx.fillRect(-1, 2+bob, 3, 10);
  // Belt
  ctx.fillStyle = '#333';
  ctx.fillRect(-8, 12+bob, 16, 2);

  // ARMS
  const armSwing = state==='walking' ? Math.sin(Date.now()/150)*5 : 0;
  // Left arm
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.ellipse(-10+armSwing, 5+bob, 4, 10, -0.3, 0, Math.PI*2);
  ctx.fill();
  // Right arm
  ctx.beginPath();
  ctx.ellipse(10-armSwing, 5+bob, 4, 10, 0.3, 0, Math.PI*2);
  ctx.fill();
  // Paw hands
  ctx.fillStyle = points;
  ctx.beginPath(); ctx.arc(-10+armSwing, 14+bob, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10-armSwing, 14+bob, 3, 0, Math.PI*2); ctx.fill();

  // HEAD
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.arc(0, -5+bob, 12, 0, Math.PI*2);
  ctx.fill();

  // EARS
  // Left ear
  ctx.fillStyle = points;
  ctx.beginPath();
  ctx.moveTo(-10, -8+bob);
  ctx.lineTo(-14, -22+bob);
  ctx.lineTo(-3, -10+bob);
  ctx.fill();
  // Left inner
  ctx.fillStyle = inner;
  ctx.beginPath();
  ctx.moveTo(-8, -9+bob);
  ctx.lineTo(-11, -18+bob);
  ctx.lineTo(-4, -10+bob);
  ctx.fill();
  // Right ear
  ctx.fillStyle = points;
  ctx.beginPath();
  ctx.moveTo(10, -8+bob);
  ctx.lineTo(14, -22+bob);
  ctx.lineTo(3, -10+bob);
  ctx.fill();
  // Right inner
  ctx.fillStyle = inner;
  ctx.beginPath();
  ctx.moveTo(8, -9+bob);
  ctx.lineTo(11, -18+bob);
  ctx.lineTo(4, -10+bob);
  ctx.fill();

  // Face mask (siamese)
  if (cat.id === 'thongek') {
    ctx.fillStyle = points+'44';
    ctx.beginPath();
    ctx.ellipse(0, -4+bob, 8, 7, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // Eyes
  const eyeY = -6+bob;
  // Left eye
  ctx.fillStyle = eyes;
  ctx.beginPath(); ctx.ellipse(-5, eyeY, 3, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-4.5, eyeY+0.5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-5, eyeY-0.5, 0.8, 0, Math.PI*2); ctx.fill();
  // Right eye
  ctx.fillStyle = eyes;
  ctx.beginPath(); ctx.ellipse(5, eyeY, 3, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(5.5, eyeY+0.5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(5, eyeY-0.5, 0.8, 0, Math.PI*2); ctx.fill();

  // Nose
  ctx.fillStyle = '#ff9999';
  ctx.beginPath(); ctx.arc(0, -1+bob, 2, 0, Math.PI*2); ctx.fill();
  // Mouth
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(0, 1+bob);
  ctx.quadraticCurveTo(-3, 3+bob, -5, 2+bob);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, 1+bob);
  ctx.quadraticCurveTo(3, 3+bob, 5, 2+bob);
  ctx.stroke();

  // Whiskers
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 0.6;
  for (let s=-1;s<=1;s+=2) {
    ctx.beginPath(); ctx.moveTo(s*4, -1+bob); ctx.lineTo(s*12, -4+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*4, 0+bob); ctx.lineTo(s*12, 0+bob); ctx.stroke();
  }

  // Working indicator
  if (state === 'working') {
    const t = Date.now()/200;
    ctx.fillStyle = '#ffcc00';
    ctx.globalAlpha = 0.4+0.3*Math.sin(t*3);
    ctx.beginPath(); ctx.arc(8, -12+bob, 3, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ============================================================
// DRAW SCENE
// ============================================================
function drawFloor() {
  // Floor
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(0, 0, W, H);
  // Floor tiles
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x=0;x<W;x+=40) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y=0;y<H;y+=40) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  // Carpet area
  ctx.fillStyle = 'rgba(60,40,30,0.3)';
  ctx.fillRect(80, 60, 820, 480);

  // Walls
  ctx.fillStyle = '#1e1e32';
  ctx.fillRect(0,0,W,8); // top wall
  ctx.fillRect(0,0,8,H); // left wall
  ctx.fillRect(W-8,0,8,H); // right wall
  ctx.fillRect(0,H-8,W,8); // bottom wall
}

function drawProps() {
  // Coffee machine
  ctx.fillStyle = '#443322';
  ctx.fillRect(coffeeMachine.x, coffeeMachine.y, 20, 28);
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(coffeeMachine.x+4, coffeeMachine.y+4, 12, 6);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.fillText('☕', coffeeMachine.x+5, coffeeMachine.y+26);

  // Plants
  [plant1, plant2].forEach(p => {
    ctx.fillStyle = '#553322';
    ctx.fillRect(p.x+6, p.y+12, 12, 16);
    ctx.fillStyle = '#228833';
    ctx.beginPath(); ctx.arc(p.x+12, p.y+8, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#33aa44';
    ctx.beginPath(); ctx.arc(p.x+12, p.y+6, 10, 0, Math.PI*2); ctx.fill();
  });
}

// ============================================================
// MAIN LOOP
// ============================================================
function update() {
  cats.forEach(cat => {
    const dx = cat.tx - cat.x;
    const dy = cat.ty - cat.y;
    const dist = Math.sqrt(dx*dx+dy*dy);

    if (dist > 1) {
      cat.state = 'walking';
      const speed = 2;
      cat.x += (dx/dist) * speed;
      cat.y += (dy/dist) * speed;
    } else {
      cat.x = cat.tx;
      cat.y = cat.ty;
      if (cat.state === 'walking') {
        cat.state = 'working';
      }
    }
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawFloor();
  drawProps();

  // Draw desks
  desks.forEach(d => drawDesk(d.x, d.y, d.color, d.label));

  // Draw cats (sorted by y for depth)
  const sorted = [...cats].sort((a,b) => a.y - b.y);
  sorted.forEach(cat => drawCat(cat));
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ============================================================
// AI: ASSIGN TASKS (random cat walks to random spot)
// ============================================================
function assignRandomTask() {
  const cat = cats[Math.floor(Math.random()*cats.length)];
  if (cat.state === 'walking') return;

  // 70% walk to desk, 30% walk to coffee/random
  if (Math.random() < 0.7) {
    const d = desks[cat.desk];
    cat.tx = d.x + 35;
    cat.ty = d.y + 35;
  } else if (Math.random() < 0.5) {
    cat.tx = coffeeMachine.x + 10 + Math.random()*30;
    cat.ty = coffeeMachine.y + 10;
  } else {
    cat.tx = 100 + Math.random()*(W-200);
    cat.ty = 80 + Math.random()*(H-160);
  }

  // After arriving, stay for a bit then go back to desk
  setTimeout(() => {
    const d = desks[cat.desk];
    cat.tx = d.x + 35;
    cat.ty = d.y + 35;
  }, 3000 + Math.random()*5000);
}

setInterval(assignRandomTask, 4000);

// ============================================================
// CLICK TO VIEW CAT INFO
// ============================================================
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  let found = null;
  for (const cat of cats) {
    const dx = mx - cat.x, dy = my - cat.y;
    if (Math.sqrt(dx*dx+dy*dy) < 25) {
      found = cat;
      break;
    }
  }

  if (found) {
    const st = found.state==='walking'?'🚶 เดิน':found.state==='working'?'💼 ทำงาน':'😴 ว่าง';
    info.innerHTML = `
      <b style="color:${desks[found.desk].color}">${found.name}</b>
      🐱 ${found.breed} · ${st}
      &nbsp;🔄 ${found.tasks.toLocaleString()} งาน &nbsp;✅ ${found.rate}%
      &nbsp;📋 ${found.logs[0]}
    `;
    info.style.display = 'block';
  } else {
    info.style.display = 'none';
  }
});

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  let over = false;
  for (const cat of cats) {
    if (Math.sqrt((mx-cat.x)**2+(my-cat.y)**2) < 25) { over = true; break; }
  }
  canvas.style.cursor = over ? 'pointer' : 'default';
});

// ============================================================
// START
// ============================================================
loop();

// Initial: all cats at their desks
cats.forEach(cat => {
  const d = desks[cat.desk];
  cat.x = d.x + 35;
  cat.y = d.y + 35;
  cat.tx = cat.x;
  cat.ty = cat.y;
  cat.state = 'working';
});

// Distribute initial positions around the office
setTimeout(() => {
  cats.forEach((cat,i) => {
    cat.tx = 100 + (i%4)*200 + Math.random()*60;
    cat.ty = 120 + Math.floor(i/4)*240 + Math.random()*40;
  });
  // After arriving, go back to desks
  setTimeout(() => {
    cats.forEach(cat => {
      const d = desks[cat.desk];
      cat.tx = d.x + 35;
      cat.ty = d.y + 35;
    });
  }, 4000);
}, 1500);
</script>
</body>
</html>
