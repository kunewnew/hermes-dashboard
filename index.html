<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 Meow Office · Live Cat Agent Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e; display: flex; justify-content: center; align-items: center;
  min-height: 100vh; overflow: hidden;
  font-family: 'Courier New', 'Noto Sans Thai', monospace;
}
#wrap { position: relative; }
canvas { display: block; border: 2px solid #333355; cursor: pointer; }
#panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.9); border-top: 2px solid #ffcc00;
  color: #ccc; padding: 8px 14px; font-size: 11px;
  display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
}
#panel .label { color: #888; font-size: 9px; text-transform: uppercase; }
#panel b { margin-right: 4px; }
#legend {
  position: absolute; top: 6px; right: 6px;
  background: rgba(0,0,0,0.8); border: 1px solid #333;
  padding: 4px 8px; font-size: 9px; color: #888;
  display: flex; gap: 10px;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="legend">
    <span>🟢 ว่าง</span> <span>🚶 เดิน</span> <span style="color:#ffcc00">💛 ทำงาน</span>
    <span style="color:#00ff88">💰 OR $4.13</span> <span style="color:#b44aff">⚡ OC ~$2.52</span>
  </div>
  <div id="panel">
    <span class="label">คลิกที่แมวเพื่อดูรายละเอียด</span>
    <span id="panelInfo" style="color:#ffcc00;">🐱 พร้อมทำงาน...</span>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const panelInfo = document.getElementById('panelInfo');

const W = 1100, H = 620;
canvas.width = W; canvas.height = H;

function resize() {
  const scale = Math.min(innerWidth/W, (innerHeight-60)/H, 1);
  canvas.style.width = W*scale+'px';
  canvas.style.height = H*scale+'px';
}
resize(); window.addEventListener('resize', resize);

// ============================================================
// OFFICE
// ============================================================
const desks = [
  { x:80, y:70, color:'#ffcc00', role:'🧠 Orchestrator' },
  { x:330, y:70, color:'#ff8833', role:'💻 Full-Stack' },
  { x:580, y:70, color:'#44dd44', role:'⚙️ Backend' },
  { x:830, y:70, color:'#ffaa00', role:'🌐 Explorer' },
  { x:180, y:280, color:'#ffcc00', role:'⏰ Scheduler' },
  { x:450, y:280, color:'#ff88cc', role:'📚 Memory' },
  { x:720, y:280, color:'#8888ff', role:'📁 File Manager' },
];

// ============================================================
// CATS
// ============================================================
const cats = [
  { id:'thongek', name:'ทองเอก', breed:'วิเชียรมาศ', role:'CEO · Orchestrator',
    body:'#faf0dc', points:'#3d2b1a', eyes:'#4488ff', inner:'#f5d5c8',
    outfit:'#1a2a44', accent:'#ffcc00',
    x:80, y:140, tx:80, ty:140, state:'idle', desk:0,
    task:'วิเคราะห์คำขอ + วางแผน', tasks:1284, rate:97 },
  { id:'eren', name:'เอเรน', breed:'แมวส้มขนฟู', role:'Full-Stack Dev',
    body:'#ff8833', points:'#ff9944', eyes:'#44cc44', inner:'#ffbb88',
    outfit:'#ffffff', accent:'#ff4444',
    x:330, y:140, tx:330, ty:140, state:'idle', desk:1,
    task:'เขียนโค้ด Dashboard', tasks:2341, rate:95 },
  { id:'codin', name:'Codin', breed:'สีสวาท', role:'Backend Dev',
    body:'#8899aa', points:'#667788', eyes:'#44dd44', inner:'#aabbcc',
    outfit:'#2a2a3a', accent:'#44dd44',
    x:580, y:140, tx:580, ty:140, state:'idle', desk:2,
    task:'Debug API + Refactor', tasks:3421, rate:94 },
  { id:'navi', name:'Navi', breed:'ขาวมณี', role:'Web Explorer',
    body:'#ffffff', points:'#eeeeee', eyes:'#ffaa00', inner:'#ffdddd',
    outfit:'#336644', accent:'#ffaa00',
    x:830, y:140, tx:830, ty:140, state:'idle', desk:3,
    task:'ค้นหา + scrape ข้อมูล', tasks:2156, rate:96 },
  { id:'ticktock', name:'Tick-Tock', breed:'ลายสลิด', role:'Scheduler',
    body:'#999999', points:'#666666', eyes:'#ffcc00', inner:'#bbbbbb',
    outfit:'#443322', accent:'#ffcc00',
    x:180, y:350, tx:180, ty:350, state:'idle', desk:4,
    task:'แจ้งตารางสอน + cron', tasks:876, rate:99 },
  { id:'nora', name:'Nora', breed:'สามสี', role:'Memory Keeper',
    body:'#ffffff', points:'#ff9944', eyes:'#ff88cc', inner:'#ffbbcc',
    outfit:'#553344', accent:'#ff88cc',
    x:450, y:350, tx:450, ty:350, state:'idle', desk:5,
    task:'บันทึกความจำ + sync', tasks:5432, rate:100 },
  { id:'filo', name:'Filo', breed:'แมวดำ', role:'File Manager',
    body:'#1a1a1a', points:'#111111', eyes:'#ffdd00', inner:'#333333',
    outfit:'#333344', accent:'#ffffff',
    x:720, y:350, tx:720, ty:350, state:'idle', desk:6,
    task:'จัดการไฟล์ + document', tasks:1987, rate:95 },
];

const coffee = { x:20, y:480 };
const couch = { x:870, y:460, w:80, h:40 };

// ============================================================
// DRAWING
// ============================================================
function drawDesk(d) {
  const dx = d.x, dy = d.y;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(dx-3, dy+3, 86, 42);
  // Desk
  ctx.fillStyle = '#3a3a50';
  ctx.fillRect(dx, dy, 82, 38);
  ctx.strokeStyle = '#555588';
  ctx.lineWidth = 2;
  ctx.strokeRect(dx, dy, 82, 38);

  // Monitor
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(dx+22, dy-20, 38, 24);
  ctx.strokeStyle = '#444466';
  ctx.lineWidth = 2;
  ctx.strokeRect(dx+22, dy-20, 38, 24);
  // Screen content
  const t = Date.now()/1000;
  ctx.fillStyle = d.color+'15';
  ctx.fillRect(dx+24, dy-18, 34, 20);
  // Code lines on screen
  for (let i=0;i<4;i++) {
    ctx.fillStyle = d.color;
    ctx.globalAlpha = 0.3 + 0.3*Math.sin(t*3+i);
    ctx.fillRect(dx+26, dy-14+i*5, 15+Math.sin(t+i)*8, 2);
    ctx.globalAlpha = 1;
  }
  // Monitor stand
  ctx.fillStyle = '#333';
  ctx.fillRect(dx+36, dy+4, 10, 6);

  // Name plate
  ctx.fillStyle = '#111122';
  ctx.fillRect(dx+10, dy+28, 62, 10);
  ctx.fillStyle = d.color;
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(d.label||'', dx+41, dy+36);

  // Role tag
  ctx.fillStyle = d.color+'22';
  ctx.fillRect(dx+10, dy+2, 62, 8);
  ctx.fillStyle = d.color;
  ctx.font = '7px sans-serif';
  ctx.fillText(d.role, dx+41, dy+9);

  // Keyboard on desk
  ctx.fillStyle = '#222';
  ctx.fillRect(dx+14, dy+16, 54, 8);
}

function drawCat(cat) {
  const { x, y, body, points, eyes, inner, outfit, accent, state } = cat;
  ctx.save();
  ctx.translate(x, y);

  let bob = 0, legOff = 0;
  const walkCycle = Date.now()/150;
  if (state === 'walking') {
    bob = Math.abs(Math.sin(walkCycle*2))*4;
    legOff = Math.sin(walkCycle*3)*3;
  }

  // === STATUS INDICATOR ===
  if (state === 'working') {
    const t = Date.now()/400;
    // Glow aura
    ctx.fillStyle = '#ffcc00';
    ctx.globalAlpha = 0.08 + 0.04*Math.sin(t*3);
    ctx.beginPath(); ctx.arc(0, 0, 28, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // Work icon above
    ctx.fillStyle = '#ffcc00';
    ctx.globalAlpha = 0.5 + 0.4*Math.sin(t*4);
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⚡', 0, -30+bob);
    ctx.globalAlpha = 1;
  } else if (state === 'walking') {
    // Walking dots
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.3;
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🚶', 14, -12+bob);
    ctx.globalAlpha = 1;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 23+bob, 14, 5, 0, 0, Math.PI*2); ctx.fill();

  // TAIL
  const tailT = Date.now()/250;
  const tailAngle = state==='walking' ? Math.sin(walkCycle*3)*0.5 : Math.sin(tailT)*0.2;
  ctx.save();
  ctx.translate(0, 7+bob);
  ctx.rotate(0.3 + tailAngle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(7, -7, 11, -16);
  ctx.lineWidth = 4;
  ctx.strokeStyle = points;
  ctx.stroke();
  ctx.fillStyle = points;
  ctx.beginPath(); ctx.arc(11, -16, 3, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // LEGS
  ctx.fillStyle = body;
  ctx.fillRect(-4+legOff, 15+bob, 7, 8);
  ctx.fillRect(2-legOff, 15+bob, 7, 8);
  // Paws
  ctx.fillStyle = points;
  ctx.beginPath(); ctx.arc(-0.5+legOff, 23+bob, 4.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5.5-legOff, 23+bob, 4.5, 0, Math.PI*2); ctx.fill();

  // BODY + OUTFIT
  ctx.fillStyle = outfit;
  ctx.fillRect(-8, 0+bob, 16, 20);
  // Accent (tie/scarf)
  ctx.fillStyle = accent;
  ctx.fillRect(-1, 3+bob, 3, 11);
  // Belt
  ctx.fillStyle = '#333';
  ctx.fillRect(-8, 13+bob, 16, 2);

  // ARMS
  const armSwing = state==='walking' ? Math.sin(walkCycle*2)*6 : 0;
  ctx.fillStyle = body;
  ctx.save(); ctx.translate(-10+armSwing, 5+bob); ctx.rotate(-0.2);
  ctx.fillRect(-3, 0, 7, 14); ctx.restore();
  ctx.save(); ctx.translate(10-armSwing, 5+bob); ctx.rotate(0.2);
  ctx.fillRect(-3, 0, 7, 14); ctx.restore();
  // Paw hands
  ctx.fillStyle = points;
  ctx.beginPath(); ctx.arc(-10+armSwing, 18+bob, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(10-armSwing, 18+bob, 3.5, 0, Math.PI*2); ctx.fill();

  // HEAD
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(0, -6+bob, 13, 0, Math.PI*2); ctx.fill();

  // EARS
  [['left',-1],['right',1]].forEach(([_,s]) => {
    ctx.fillStyle = points;
    ctx.beginPath();
    ctx.moveTo(s*10, -9+bob); ctx.lineTo(s*15, -24+bob); ctx.lineTo(s*3, -12+bob);
    ctx.fill();
    ctx.fillStyle = inner;
    ctx.beginPath();
    ctx.moveTo(s*8, -10+bob); ctx.lineTo(s*12, -20+bob); ctx.lineTo(s*4, -12+bob);
    ctx.fill();
  });

  // Siamese mask
  if (cat.id==='thongek') {
    ctx.fillStyle = points+'33';
    ctx.beginPath(); ctx.ellipse(0, -5+bob, 9, 7.5, 0, 0, Math.PI*2); ctx.fill();
  }

  // EYES
  [-1,1].forEach(s => {
    const ex = s*5, ey = -7+bob;
    ctx.fillStyle = eyes;
    ctx.beginPath(); ctx.ellipse(ex, ey, 3.2, 3.8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(ex+0.5, ey+0.5, 1.6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ex-0.3, ey-0.5, 0.7, 0, Math.PI*2); ctx.fill();
  });

  // NOSE & MOUTH
  ctx.fillStyle = '#ff9999';
  ctx.beginPath(); ctx.arc(0, -2+bob, 2.2, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 0.7;
  [-3,3].forEach(s => {
    ctx.beginPath(); ctx.moveTo(0, 1+bob); ctx.quadraticCurveTo(s, 4+bob, s*1.8, 2+bob); ctx.stroke();
  });

  // WHISKERS
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 0.5;
  [-1,1].forEach(s => {
    ctx.beginPath(); ctx.moveTo(s*4, -1+bob); ctx.lineTo(s*13, -4+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*4, 1+bob); ctx.lineTo(s*13, 1+bob); ctx.stroke();
  });

  ctx.restore();

  // === NAME LABEL (always visible) ===
  const lblY = y - 38;
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(x-30, lblY-8, 60, 16);
  ctx.fillStyle = desks[cat.desk].color;
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(cat.name, x, lblY+4);
  // Status + role below name
  ctx.fillStyle = state==='working'?'#ffcc00':state==='walking'?'#8888ff':'#666';
  ctx.font = '7px sans-serif';
  const statusText = state==='working'?'💛 ทำงาน':state==='walking'?'🚶 เดินไป...':'🟢 '+cat.role;
  ctx.fillText(statusText, x, lblY+14);
}

function drawProps() {
  // Carpet
  ctx.fillStyle = 'rgba(50,35,25,0.25)';
  ctx.fillRect(60, 40, 980, 540);

  // Coffee machine
  ctx.fillStyle = '#3a2a1a';
  ctx.fillRect(coffee.x, coffee.y, 22, 30);
  ctx.fillStyle = '#554433';
  ctx.fillRect(coffee.x+2, coffee.y+2, 18, 10);
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(coffee.x+6, coffee.y+4, 10, 6);
  ctx.fillStyle = '#fff';
  ctx.font = '8px sans-serif';
  ctx.fillText('☕', coffee.x+8, coffee.y+28);

  // Couch
  ctx.fillStyle = '#3a3040';
  ctx.fillRect(couch.x, couch.y, couch.w, couch.h);
  ctx.fillStyle = '#4a4050';
  ctx.fillRect(couch.x+3, couch.y+3, couch.w-6, couch.h-6);
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(couch.x+10, couch.y+8, 25, couch.h-16);
  ctx.fillRect(couch.x+45, couch.y+8, 25, couch.h-16);

  // Plants
  [{x:920,y:55},{x:55,y:510}].forEach(p => {
    ctx.fillStyle = '#4a3020';
    ctx.fillRect(p.x+8, p.y+14, 14, 18);
    ctx.fillStyle = '#338833';
    ctx.beginPath(); ctx.arc(p.x+15, p.y+8, 16, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#44aa44';
    ctx.beginPath(); ctx.arc(p.x+15, p.y+6, 12, 0, Math.PI*2); ctx.fill();
  });

  // Clock on wall
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(550, 22, 14, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(550, 22, 14, 0, Math.PI*2); ctx.stroke();
  const now = new Date();
  const hourAngle = (now.getHours()%12)*Math.PI/6 - Math.PI/2;
  const minAngle = now.getMinutes()*Math.PI/30 - Math.PI/2;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(550,22); ctx.lineTo(550+Math.cos(hourAngle)*7, 22+Math.sin(hourAngle)*7); ctx.stroke();
  ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(550,22); ctx.lineTo(550+Math.cos(minAngle)*10, 22+Math.sin(minAngle)*10); ctx.stroke();
}

function drawFloor() {
  ctx.fillStyle = '#222233';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  for (let x=0;x<W;x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0;y<H;y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

// ============================================================
// GAME LOOP
// ============================================================
function update() {
  cats.forEach(cat => {
    const dx = cat.tx - cat.x, dy = cat.ty - cat.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist > 0.8) {
      cat.state = 'walking';
      cat.x += (dx/dist)*2.2;
      cat.y += (dy/dist)*2.2;
    } else {
      cat.x = cat.tx; cat.y = cat.ty;
      cat.state = 'working';
    }
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawFloor();
  drawProps();
  desks.forEach(d => drawDesk(d));
  [...cats].sort((a,b)=>a.y-b.y).forEach(cat => drawCat(cat));
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// ============================================================
// TASK ASSIGNMENT — cats walk to do things
// ============================================================
const actions = [
  'กำลังเขียนโค้ด...', 'debug ระบบ', 'ค้นหาข้อมูล', 'อ่านเอกสาร',
  'sync ข้อมูล', 'วางแผนงาน', 'ตรวจสอบ API', 'บันทึกความจำ',
  'รัน cron job', 'Refactor โมดูล', 'review PR', 'pop ส่งงาน'
];

function assignTask() {
  const cat = cats[Math.floor(Math.random()*cats.length)];
  if (cat.state === 'walking') return;

  // Random destination
  const r = Math.random();
  if (r < 0.55) {
    // Go to desk to work
    const d = desks[cat.desk];
    cat.tx = d.x + 41; cat.ty = d.y + 42;
  } else if (r < 0.75) {
    // Coffee break
    cat.tx = coffee.x + 10 + Math.random()*30;
    cat.ty = coffee.y + 10;
  } else if (r < 0.9) {
    // Couch break
    cat.tx = couch.x + 20 + Math.random()*40;
    cat.ty = couch.y + 10;
  } else {
    // Walk to random spot
    cat.tx = 90 + Math.random()*(W-180);
    cat.ty = 55 + Math.random()*(H-110);
  }

  // After 3-7s, go back to desk
  const delay = 2500 + Math.random()*5000;
  setTimeout(() => {
    const d = desks[cat.desk];
    cat.tx = d.x + 41; cat.ty = d.y + 42;
  }, delay);

  // Update panel
  const action = actions[Math.floor(Math.random()*actions.length)];
  panelInfo.innerHTML = `<b style="color:${desks[cat.desk].color}">${cat.name}</b> ${action}`;
}

setInterval(assignTask, 3500);

// ============================================================
// CLICK INTERACTION
// ============================================================
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX-rect.left)*(W/rect.width);
  const my = (e.clientY-rect.top)*(H/rect.height);

  for (const cat of cats) {
    if (Math.sqrt((mx-cat.x)**2+(my-cat.y)**2) < 26) {
      const d = desks[cat.desk];
      panelInfo.innerHTML = `
        <b style="color:${d.color}">🐱 ${cat.name}</b>
        พันธุ์${cat.breed} · ${cat.role}
        &nbsp;🔄 <b>${cat.tasks.toLocaleString()}</b> งาน
        &nbsp;✅ <b>${cat.rate}%</b> สำเร็จ
        &nbsp;📋 <b>${cat.task}</b>
      `;
      return;
    }
  }
  panelInfo.innerHTML = '<span style="color:#888">คลิกที่แมวเพื่อดูข้อมูล 🐱</span>';
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX-rect.left)*(W/rect.width);
  const my = (e.clientY-rect.top)*(H/rect.height);
  let over = cats.some(c => Math.sqrt((mx-c.x)**2+(my-c.y)**2) < 26);
  canvas.style.cursor = over ? 'pointer' : 'default';
});

// ============================================================
// INIT
// ============================================================
cats.forEach(cat => {
  const d = desks[cat.desk];
  cat.x = d.x+41; cat.y = d.y+42;
  cat.tx = cat.x; cat.ty = cat.y;
  cat.state = 'working';
});

// After 2s, cats spread out
setTimeout(() => {
  cats.forEach((cat,i) => {
    cat.tx = 120+(i%4)*230+Math.random()*50;
    cat.ty = 100+Math.floor(i/4)*240+Math.random()*30;
  });
  setTimeout(() => cats.forEach(cat => {
    const d = desks[cat.desk];
    cat.tx = d.x+41; cat.ty = d.y+42;
  }), 3500);
}, 1800);

loop();
</script>
</body>
</html>
